<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Snake — Mark's Page</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to bottom, #1a1a2e 0%, #4a1942 25%, #c0392b 55%, #e67e22 78%, #f9ca24 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      gap: 14px;
    }

    #hud {
      display: flex;
      gap: 32px;
      color: #fff;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 6px rgba(0,0,0,0.4);
      visibility: hidden;
    }

    #hud span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #hud b {
      font-weight: 700;
      font-size: 1.15rem;
    }

    canvas {
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
      display: block;
    }

    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(4px);
    }

    #overlay h2 {
      font-size: 2.2rem;
      font-weight: 300;
      color: #fff;
      letter-spacing: 1px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }

    #overlay .result {
      color: rgba(255,255,255,0.9);
      font-size: 1rem;
      font-weight: 300;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    #overlay .result .score-line {
      font-size: 1.3rem;
    }

    #overlay .result .best-line {
      font-size: 0.95rem;
      opacity: 0.75;
    }

    #overlay .new-best {
      color: #f9ca24;
      font-weight: 600;
      font-size: 1rem;
      display: none;
    }

    #overlay button {
      margin-top: 8px;
      padding: 14px 40px;
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      background: rgba(255, 255, 255, 0.15);
      border: 2px solid rgba(255, 255, 255, 0.6);
      border-radius: 50px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: background 0.2s, transform 0.15s;
    }

    #overlay button:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }

    .btn-back {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 10px 24px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      background: rgba(255, 255, 255, 0.15);
      border: 2px solid rgba(255, 255, 255, 0.6);
      border-radius: 50px;
      text-decoration: none;
      backdrop-filter: blur(6px);
      transition: background 0.2s, transform 0.15s;
    }

    .btn-back:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <a class="btn-back" href="index.html">← Back</a>

  <div id="hud">
    <span>🍎 <b id="scoreVal">0</b></span>
    <span>🏆 <b id="bestVal">0</b></span>
  </div>

  <canvas id="c"></canvas>

  <div id="overlay">
    <h2 id="overlayTitle">🐍 Snake</h2>
    <div class="result" id="result">
      <div class="score-line">Score: <b id="finalScore">0</b></div>
      <div class="best-line">Best: <b id="finalBest">0</b></div>
    </div>
    <div class="new-best" id="newBest">🎉 New record!</div>
    <button id="startBtn">Start</button>
  </div>

  <script>
    const canvas   = document.getElementById('c');
    const ctx      = canvas.getContext('2d');
    const overlay  = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const startBtn = document.getElementById('startBtn');
    const hud      = document.getElementById('hud');
    const scoreVal = document.getElementById('scoreVal');
    const bestVal  = document.getElementById('bestVal');
    const resultEl = document.getElementById('result');
    const finalScore = document.getElementById('finalScore');
    const finalBest  = document.getElementById('finalBest');
    const newBestEl  = document.getElementById('newBest');

    const CELL    = 20;
    const FPS_MIN = 6;   // начальная скорость
    const FPS_MAX = 20;  // максимальная скорость
    const BEST_KEY = 'snake_best';

    function currentFps(score) {
      // плавно растёт от FPS_MIN до FPS_MAX за первые 30 яблок
      const t = Math.min(score / 30, 1);
      return FPS_MIN + t * (FPS_MAX - FPS_MIN);
    }

    let cols, rows, snake, dir, nextDir, apple, poops, appleStreak, score, intervalId, alive;

    function getBest() { return parseInt(localStorage.getItem(BEST_KEY) || '0'); }
    function saveBest(v) { localStorage.setItem(BEST_KEY, v); }

    function resize() {
      const maxW = window.innerWidth  - 40;
      const maxH = window.innerHeight - 120;
      const size = Math.min(maxW, maxH);
      const cells = Math.floor(size / CELL);
      canvas.width  = cells * CELL;
      canvas.height = cells * CELL;
      cols = cells;
      rows = cells;
    }

    function occupied(pos) {
      return snake.some(s => s.x === pos.x && s.y === pos.y)
          || poops.some(p => p.x === pos.x && p.y === pos.y);
    }

    function spawnApple() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * cols), y: Math.floor(Math.random() * rows) };
      } while (occupied(pos));
      apple = pos;
    }

    function initGame() {
      const cx = Math.floor(cols / 2);
      const cy = Math.floor(rows / 2);
      snake        = [{ x: cx, y: cy }, { x: cx - 1, y: cy }, { x: cx - 2, y: cy }];
      dir          = { x: 1, y: 0 };
      nextDir      = { x: 1, y: 0 };
      score        = 0;
      poops        = [];
      appleStreak  = 0;
      alive        = true;
      scoreVal.textContent = '0';
      bestVal.textContent  = getBest();
      spawnApple();
    }

    function drawPoop(p) {
      const cx = p.x * CELL + CELL / 2;
      const cy = p.y * CELL + CELL / 2;
      const r  = CELL / 2 - 3;

      ctx.fillStyle = '#6d3b00';
      // три шарика горкой — снизу два, сверху один
      ctx.beginPath();
      ctx.arc(cx - r * 0.45, cy + r * 0.3, r * 0.55, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx + r * 0.45, cy + r * 0.3, r * 0.55, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx, cy - r * 0.2, r * 0.55, 0, Math.PI * 2);
      ctx.fill();
      // вершина-завиток
      ctx.beginPath();
      ctx.arc(cx, cy - r * 0.75, r * 0.3, 0, Math.PI * 2);
      ctx.fill();

      // блики-глаза
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.beginPath();
      ctx.arc(cx - r * 0.45 - 1, cy + r * 0.15, 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx + r * 0.45 - 1, cy + r * 0.15, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawApple() {
      const cx = apple.x * CELL + CELL / 2;
      const cy = apple.y * CELL + CELL / 2;
      const r  = CELL / 2 - 2;

      // body
      ctx.fillStyle = '#e74c3c';
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();

      // shine
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.beginPath();
      ctx.ellipse(cx - r * 0.25, cy - r * 0.3, r * 0.28, r * 0.18, -0.5, 0, Math.PI * 2);
      ctx.fill();

      // stem
      ctx.strokeStyle = '#5d4037';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(cx + 1, cy - r);
      ctx.quadraticCurveTo(cx + 5, cy - r - 5, cx + 4, cy - r - 8);
      ctx.stroke();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // board
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // grid
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 1;
      for (let x = 0; x <= cols; x++) {
        ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
      }
      for (let y = 0; y <= rows; y++) {
        ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
      }

      // poops
      poops.forEach(drawPoop);

      // apple
      drawApple();

      // snake
      snake.forEach((seg, i) => {
        const isHead = i === 0;
        const t = i / Math.max(snake.length - 1, 1);
        const r = Math.round(60  + t * 20);
        const g = Math.round(220 - t * 80);
        const b = Math.round(60  + t * 20);
        ctx.fillStyle = `rgb(${r},${g},${b})`;

        const pad = isHead ? 1 : 2;
        const x   = seg.x * CELL + pad;
        const y   = seg.y * CELL + pad;
        const s   = CELL - pad * 2;
        const rad = CELL / 2 - 1;
        ctx.beginPath();
        ctx.moveTo(x + rad, y);
        ctx.lineTo(x + s - rad, y);
        ctx.arcTo(x + s, y,     x + s, y + rad,     rad);
        ctx.lineTo(x + s, y + s - rad);
        ctx.arcTo(x + s, y + s, x + s - rad, y + s, rad);
        ctx.lineTo(x + rad, y + s);
        ctx.arcTo(x,     y + s, x,     y + s - rad,  rad);
        ctx.lineTo(x,     y + rad);
        ctx.arcTo(x,     y,     x + rad, y,           rad);
        ctx.closePath();
        ctx.fill();

        if (isHead) {
          ctx.fillStyle = '#fff';
          const ex  = dir.x !== 0 ? (dir.x > 0 ? 0.7 : 0.3) : 0.3;
          const ey  = dir.y !== 0 ? (dir.y > 0 ? 0.7 : 0.3) : 0.3;
          const ex2 = dir.x !== 0 ? ex  : 0.7;
          const ey2 = dir.y !== 0 ? ey  : ey;
          ctx.beginPath();
          ctx.arc(seg.x * CELL + CELL * ex,  seg.y * CELL + CELL * ey,  2.5, 0, Math.PI * 2);
          ctx.arc(seg.x * CELL + CELL * ex2, seg.y * CELL + CELL * ey2, 2.5, 0, Math.PI * 2);
          ctx.fill();
        }
      });
    }

    function step() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      if (head.x < 0 || head.y < 0 || head.x >= cols || head.y >= rows)          { die(); return; }
      if (snake.some(s => s.x === head.x && s.y === head.y))                     { die(); return; }
      if (poops.some(p => p.x === head.x && p.y === head.y))                     { die(); return; }

      snake.unshift(head);

      if (head.x === apple.x && head.y === apple.y) {
        score++;
        appleStreak++;
        scoreVal.textContent = score;
        if (appleStreak >= 3) {
          // какаем хвостом
          const tail = snake[snake.length - 1];
          poops.push({ x: tail.x, y: tail.y });
          appleStreak = 0;
        }
        spawnApple();
        clearInterval(intervalId);
        intervalId = setInterval(step, 1000 / currentFps(score));
      } else {
        snake.pop();
      }

      draw();
    }

    function die() {
      alive = false;
      clearInterval(intervalId);
      draw();

      ctx.fillStyle = 'rgba(200,0,0,0.22)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const best    = getBest();
      const isNew   = score > best;
      if (isNew) saveBest(score);
      const newBest = isNew ? score : best;

      bestVal.textContent = newBest;
      finalScore.textContent = score;
      finalBest.textContent  = newBest;

      overlayTitle.textContent = '💀 Game Over';
      resultEl.style.display   = 'flex';
      newBestEl.style.display  = isNew ? 'block' : 'none';
      startBtn.textContent     = 'Play Again';
      overlay.style.display    = 'flex';
    }

    function startGame() {
      overlay.style.display   = 'none';
      resultEl.style.display  = 'none';
      newBestEl.style.display = 'none';
      resize();
      initGame();
      draw();
      hud.style.visibility = 'visible';
      clearInterval(intervalId);
      intervalId = setInterval(step, 1000 / currentFps(0));
    }

    // keyboard
    document.addEventListener('keydown', e => {
      if (!alive) return;
      const map = {
        ArrowUp:    { x:  0, y: -1 },
        ArrowDown:  { x:  0, y:  1 },
        ArrowLeft:  { x: -1, y:  0 },
        ArrowRight: { x:  1, y:  0 },
      };
      const d = map[e.key];
      if (!d) return;
      if (d.x === -dir.x && d.y === -dir.y) return;
      nextDir = d;
      e.preventDefault();
    });

    // swipe
    let touchStart = null;
    document.addEventListener('touchstart', e => {
      touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }, { passive: true });

    document.addEventListener('touchend', e => {
      if (!touchStart || !alive) return;
      const dx = e.changedTouches[0].clientX - touchStart.x;
      const dy = e.changedTouches[0].clientY - touchStart.y;
      touchStart = null;
      if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
      let d = Math.abs(dx) > Math.abs(dy)
        ? (dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 })
        : (dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 });
      if (d.x === -dir.x && d.y === -dir.y) return;
      nextDir = d;
    }, { passive: true });

    startBtn.addEventListener('click', startGame);

    // initial render
    resize();
    bestVal.textContent = getBest();
  </script>
</body>
</html>
